name: Build KMP iOS App

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    env:
      LANG: en_US.UTF-8

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 2️⃣ Set up JDK for Kotlin/Gradle
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 3️⃣ Install dependencies for iOS build
      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod install --project-directory=iosApp

      # 4️⃣ Build KMP shared code
      - name: Build KMP shared code
        run: ./gradlew :shared:assembleRelease

      # 5️⃣ Build the iOS app archive (.xcarchive)
      - name: Archive iOS App
        run: |
          cd iosApp
          xcodebuild -project iosApp.xcodeproj \
                     -scheme iosApp \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath $PWD/build/iosApp.xcarchive archive

      # 6️⃣ Export .ipa from the archive
      - name: Export .ipa
        run: |
          cd iosApp
          xcodebuild -exportArchive \
                     -archivePath $PWD/build/iosApp.xcarchive \
                     -exportOptionsPlist ExportOptions.plist \
                     -exportPath $PWD/build

      # 7️⃣ Upload the .ipa as artifact
      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: iosApp-ipa
          path: iosApp/build/*.ipa
